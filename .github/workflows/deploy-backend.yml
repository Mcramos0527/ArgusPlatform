name: Deploy Backend to HuggingFace

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push backend to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@argus"
          git config --global user.name "ARGUS CI"

          # Verify HF_TOKEN is set
          if [ -z "$HF_TOKEN" ]; then
            echo "ERROR: HF_TOKEN secret is not set or empty"
            exit 1
          fi

          # Clone the HuggingFace space
          git clone https://Argusdelfabro:$HF_TOKEN@huggingface.co/spaces/Argusdelfabro/argus-api hf_space

          # Sync backend folder into the space
          rsync -av --delete \
            --exclude='.git' \
            backend/ hf_space/

          # Push to HuggingFace
          cd hf_space
          git add -A
          git diff --cached --quiet || git commit -m "deploy: update from GitHub ${{ github.sha }}"
          git push
