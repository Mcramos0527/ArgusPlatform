name: CI — Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Check syntax
        run: python -m py_compile backend/app/main.py && echo "✓ syntax OK"

  # Koyeb handles deploy automatically on every push to main.
  # No deploy hook needed here — configured directly in Koyeb dashboard.
